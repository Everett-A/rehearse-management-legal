<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Rehearse Management</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #ffffff;
      --surface:        #f8f9fa;
      --border:         #e5e7eb;
      --text:           #111827;
      --text-secondary: #6b7280;
      --link:           #1d4ed8;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', Consolas, Monaco, 'Courier New', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #0f172a;
        --surface:        #1e293b;
        --border:         #334155;
        --text:           #f1f5f9;
        --text-secondary: #94a3b8;
        --link:           #60a5fa;
      }
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 64px 28px;
    }

    .app-name {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--text);
      display: block;
      margin-bottom: 48px;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      padding: 24px 20px;
      text-decoration: none;
      transition: background 0.1s;
    }

    .link-card:hover { background: var(--border); }

    .link-card-left { }

    .link-card-title {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .link-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .link-card-arrow {
      font-size: 20px;
      color: var(--text-secondary);
      flex-shrink: 0;
      margin-left: 16px;
    }

    footer {
      margin-top: 64px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-secondary);
    }

    footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="page">

    <span class="app-name">Rehearse Management</span>

    <h1>LEGAL</h1>
    <p class="subtitle">
      Developed by Everett Randolph Anton · Colorado, United States
    </p>

    <div class="links">
      <a href="privacy-policy.html" class="link-card">
        <div class="link-card-left">
          <span class="link-card-title">PRIVACY POLICY</span>
          <span class="link-card-desc">How we collect, use, and protect your information</span>
        </div>
        <span class="link-card-arrow">›</span>
      </a>
      <a href="terms-of-use.html" class="link-card">
        <div class="link-card-left">
          <span class="link-card-title">TERMS OF USE</span>
          <span class="link-card-desc">Rules and conditions governing your use of the App</span>
        </div>
        <span class="link-card-arrow">›</span>
      </a>
    </div>

    <footer>
      <p>© 2026 Everett Randolph Anton · <a href="mailto:privacy@everettanton.com">privacy@everettanton.com</a></p>
    </footer>

  </div>
</body>
</html>
