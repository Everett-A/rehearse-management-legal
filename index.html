<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal — Rehearse Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #F5F5F3;
      --surface:        #EFEFEC;
      --border:         #D0D0CC;
      --text:           #0D0D0D;
      --text-secondary: #4A4A4A;
      --text-muted:     #888888;
      --primary:        #00CC55;
      --font-sans: 'Open Sans', -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
      --font-mono: 'Share Tech Mono', 'SF Mono', 'Fira Code', Consolas, Monaco, 'Courier New', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:             #111113;
        --surface:        #1C1C1F;
        --border:         #38383A;
        --text:           #F2F2F0;
        --text-secondary: #AEAEB2;
        --text-muted:     #636366;
        --primary:        #00CC55;
      }
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 64px 28px;
    }

    .app-name {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 4px;
      color: var(--text);
      display: block;
      margin-bottom: 48px;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-left: 3px solid transparent;
      padding: 24px 20px;
      text-decoration: none;
      transition: border-color 0.1s;
    }

    .link-card:hover { border-left-color: var(--primary); }

    .link-card-title {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--text);
      display: block;
      margin-bottom: 4px;
    }

    .link-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .link-card-arrow {
      font-size: 20px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: 16px;
    }

    footer {
      margin-top: 64px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    footer a {
      color: var(--text-muted);
      text-decoration: none;
    }

    footer a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="page">

    <span class="app-name">REHEARSE MANAGEMENT</span>

    <h1>LEGAL</h1>
    <p class="subtitle">
      Developed by Everett Randolph Anton · Colorado, United States
    </p>

    <div class="links">
      <a href="privacy-policy.html" class="link-card">
        <div class="link-card-left">
          <span class="link-card-title">PRIVACY POLICY</span>
          <span class="link-card-desc">How we collect, use, and protect your information</span>
        </div>
        <span class="link-card-arrow">›</span>
      </a>
      <a href="terms-of-use.html" class="link-card">
        <div class="link-card-left">
          <span class="link-card-title">TERMS OF USE</span>
          <span class="link-card-desc">Rules and conditions governing your use of the App</span>
        </div>
        <span class="link-card-arrow">›</span>
      </a>
    </div>

    <footer>
      <p>© 2026 Everett Randolph Anton · <a href="mailto:privacy@everettanton.com">privacy@everettanton.com</a></p>
    </footer>

  </div>
</body>
</html>
